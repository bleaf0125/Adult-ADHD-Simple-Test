function getOverallComment(scores){

    let social = scores.social;
    let structure = scores.structure;
    let emotion = scores.emotion;
    let explore = scores.explore;
    let action = scores.action;

    if(explore >= 10 && emotion >= 10){

        return `
        <h3>高探索 × 高敏感型</h3>

        <p>
        你對世界保持高度好奇，也容易深入投入感興趣的主題。<br>
        但同時，你對情緒、氣氛與環境變化的感受也比較深。
        </p>

        <p>
        你可能不是不想接觸世界，
        而是世界進入你的速度太快。
        </p>

        <p>
        對你而言，
        保留恢復空間與自己的節奏非常重要。
        </p>
        `;
    }

    if(structure >= 10 && social >= 10){

        return `
        <h3>穩定節奏型</h3>

        <p>
        你比較需要穩定、可預測與低干擾的生活節奏。<br>
        過度混亂的人際或環境，
        容易讓你快速耗能。
        </p>

        <p>
        當你擁有自己的節奏與空間時，
        通常能運作得很好。
        </p>
        `;
    }

    if(action >= 10 && explore >= 10){

        return `
        <h3>高動能 × 靈感波動型</h3>

        <p>
        你可能會突然高度投入某些事情，
        爆發出很強的行動力與創造力。
        </p>

        <p>
        但同時，
        你的節奏也容易受到情緒、興趣與環境影響。
        </p>

        <p>
        建立「能開始的小步驟」，
        對你比逼迫自己穩定更重要。
        </p>
        `;
    }

    return `
    <h3>平衡觀察型</h3>

    <p>
    你的結果並沒有明顯集中在單一方向，
    而是依情境、壓力與生活狀態而變動。
    </p>

    <p>
    你可能是一個會持續觀察自己、
    並慢慢調整生活節奏的人。
    </p>
    `;
}
