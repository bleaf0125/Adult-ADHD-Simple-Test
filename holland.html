<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holland 職業性向測驗 · 河馬的小工具箱</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --blue:#2c6bed;
  --blue-dark:#1d4fb8;
  --R:#E8521A; --I:#2563EB; --A:#9333EA;
  --S:#16A34A; --E:#CA8A04; --C:#0891B2;
  --bg:#f4f6f9;
  --surface:#fff;
  --text:#222;
  --text2:#555;
  --text3:#888;
  --border:#e5e7eb;
  --radius:14px;
}

body{
  font-family:"Microsoft JhengHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#2c6bed,#5f8fff);
  color:#fff;
  padding:56px 20px 44px;
  text-align:center;
}
.header h1{font-size:36px;font-weight:bold;margin-bottom:10px;}
.header p{font-size:16px;opacity:0.88;line-height:1.7;}
.header-badges{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:18px;
}
.header-badge{
  font-size:12px;padding:4px 14px;border-radius:100px;
  border:1px solid rgba(255,255,255,0.35);color:rgba(255,255,255,0.8);
}

/* ── CONTAINER ── */
.container{max-width:780px;margin:0 auto;padding:36px 20px 60px;}

/* ── NOTE ── */
.note{
  background:#fff7d8;border-left:5px solid #f0c000;
  padding:16px 18px;border-radius:12px;margin-bottom:36px;
  font-size:14px;line-height:1.8;color:#555;
}

/* ── PROGRESS ── */
.progress-wrap{
  background:var(--border);border-radius:4px;height:5px;
  margin-bottom:8px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,#2c6bed,#9333EA);
  border-radius:4px;transition:width 0.4s ease;width:0%;
}
.progress-label{
  font-size:13px;color:var(--text3);text-align:right;margin-bottom:28px;
}

/* ── GROUP ── */
.q-group{display:none;}
.q-group.active{display:block;animation:fadeUp 0.3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

.group-header{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;
}
.group-pip{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.group-title{font-size:13px;letter-spacing:0.08em;color:var(--text2);font-weight:bold;}

/* ── QUESTION CARD ── */
.q-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;
}
.q-text{font-size:15px;line-height:1.65;margin-bottom:16px;color:var(--text);}

/* ── SCALE ── */
.scale-row{
  display:flex;align-items:center;gap:0;
  justify-content:space-between;
}
.scale-labels{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--text3);margin-top:8px;
}
.scale-btn{
  flex:1;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;background:none;border:none;padding:6px 4px;
  border-radius:10px;transition:background 0.15s;
}
.scale-btn:hover .scale-circle{border-color:var(--accent,#2c6bed);}
.scale-btn.selected .scale-circle{
  background:var(--accent,#2c6bed);
  border-color:var(--accent,#2c6bed);
}
.scale-btn.selected .scale-num{color:var(--accent,#2c6bed);font-weight:bold;}
.scale-circle{
  width:36px;height:36px;border-radius:50%;
  border:2px solid var(--border);
  transition:all 0.15s;
  background:var(--bg);
}
.scale-num{font-size:13px;color:var(--text3);}

/* ── NAV ── */
.quiz-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:28px;
}
.btn-nav{
  font-family:"Microsoft JhengHei",sans-serif;
  font-size:14px;font-weight:bold;
  padding:10px 24px;border-radius:10px;
  border:2px solid var(--border);
  cursor:pointer;background:transparent;color:var(--text);
  transition:all 0.15s;
}
.btn-nav:hover{border-color:#aaa;}
.btn-nav.primary{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-nav.primary:hover{background:var(--blue-dark);border-color:var(--blue-dark);}
.btn-nav:disabled{opacity:0.3;cursor:not-allowed;}

/* ── RESULT ── */
#result{display:none;padding:36px 20px 60px;}
.result-inner{max-width:780px;margin:0 auto;}

.result-hero{
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  color:#fff;border-radius:20px;padding:3rem 2rem;
  text-align:center;margin-bottom:28px;position:relative;overflow:hidden;
}
.result-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 120%,var(--hero-glow,#1e3a5f) 0%,transparent 70%);
}
.result-hero>*{position:relative;}
.result-eyebrow{font-size:12px;letter-spacing:0.15em;color:#94A3B8;margin-bottom:10px;}
.result-code{
  font-size:clamp(3rem,10vw,5.5rem);font-weight:900;
  letter-spacing:0.15em;line-height:1;margin-bottom:8px;
}
.result-names{font-size:15px;color:#CBD5E1;margin-bottom:18px;line-height:1.8;}
.result-desc{
  font-size:14px;color:#94A3B8;line-height:1.9;
  max-width:500px;margin:0 auto;
}

/* ── SCORE BARS ── */
.scores-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:20px;
}
.scores-section h3{
  font-size:12px;letter-spacing:0.1em;color:var(--text2);
  margin-bottom:18px;font-weight:bold;
}
.score-row{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.score-row:last-child{margin-bottom:0;}
.score-type-label{
  width:72px;font-size:13px;font-weight:bold;flex-shrink:0;
}
.score-bar-bg{
  flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;
}
.score-bar-fill{
  height:100%;border-radius:4px;
  transition:width 0.8s cubic-bezier(.4,0,.2,1);
}
.score-val{width:36px;text-align:right;font-size:13px;color:var(--text2);flex-shrink:0;}

/* ── THREE TYPE CARDS ── */
.three-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;margin-bottom:20px;
}
.type-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
}
.type-card-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.type-badge{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;flex-shrink:0;
}
.type-card-name{font-size:14px;font-weight:bold;color:var(--text);}
.type-card-sub{font-size:12px;color:var(--text3);}
.type-card p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.career-chips{display:flex;flex-wrap:wrap;gap:6px;}
.career-chip{
  font-size:12px;padding:3px 10px;border-radius:100px;
  background:var(--bg);border:1px solid var(--border);color:var(--text2);
}

/* ── TRAITS SECTION ── */
.traits-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;margin-bottom:20px;
}
.traits-section h3{
  font-size:12px;letter-spacing:0.1em;color:var(--text2);
  margin-bottom:16px;font-weight:bold;
}
.trait-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.trait-list li{
  font-size:14px;color:var(--text2);
  padding-left:18px;position:relative;line-height:1.6;
}
.trait-list li::before{
  content:'';position:absolute;left:0;top:0.55em;
  width:7px;height:7px;border-radius:50%;
  background:var(--top-color,#2c6bed);
}

/* ── BACK / RESTART ── */
.result-footer{display:flex;gap:12px;justify-content:center;margin-top:28px;}
.btn-back{
  font-family:"Microsoft JhengHei",sans-serif;
  font-size:14px;padding:10px 22px;border-radius:10px;
  border:2px solid var(--border);background:transparent;
  color:var(--text2);cursor:pointer;transition:all 0.15s;
}
.btn-back:hover{border-color:#aaa;color:var(--text);}
.btn-back.accent{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-back.accent:hover{background:var(--blue-dark);}

.footer{text-align:center;padding:30px 20px;color:#888;font-size:13px;}

/* hex SVG */
.hex-wrap{display:flex;justify-content:center;margin:4px 0 24px;}
</style>
</head>
<body>

<div class="header">
  <h1>Holland 職業性向測驗</h1>
  <p>每題以 1–5 分評估符合程度，找出你的三碼職涯類型</p>
  <div class="header-badges">
    <span class="header-badge">R 實用型</span>
    <span class="header-badge">I 研究型</span>
    <span class="header-badge">A 藝術型</span>
    <span class="header-badge">S 社會型</span>
    <span class="header-badge">E 企業型</span>
    <span class="header-badge">C 事務型</span>
  </div>
</div>

<!-- ═══ QUIZ ═══ -->
<div id="quiz">
<div class="container">
  <div class="note">
    <b>說明：</b><br>
    請針對每一道描述，依照「符合自己的程度」選擇分數：<br>
    <b>1</b> = 完全不像我　<b>2</b> = 有點不像　<b>3</b> = 普通／不確定　<b>4</b> = 有點像我　<b>5</b> = 非常像我
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="progress-label" id="prog-label"></div>

  <div id="groups-wrap"></div>

  <div class="quiz-nav">
    <button class="btn-nav" id="btn-prev" onclick="prevG()">← 上一組</button>
    <span id="page-info" style="font-size:14px;color:#888;"></span>
    <button class="btn-nav primary" id="btn-next" onclick="nextG()">下一組 →</button>
  </div>
</div>
</div>

<!-- ═══ RESULT ═══ -->
<div id="result">
<div class="result-inner">

  <div class="result-hero" id="result-hero">
    <p class="result-eyebrow">你的 Holland 三碼類型</p>
    <div class="result-code" id="res-code"></div>
    <div class="result-names" id="res-names"></div>
    <p class="result-desc" id="res-desc"></p>
  </div>

  <div class="hex-wrap">
    <svg id="hex-svg" width="300" height="280" viewBox="0 0 300 280" style="overflow:visible;"></svg>
  </div>

  <div class="scores-section">
    <h3>六型得分分布</h3>
    <div id="scores-bars"></div>
  </div>

  <div class="three-grid" id="three-grid"></div>

  <div class="traits-section" id="traits-section">
    <h3>你的主要特質（依主型）</h3>
    <ul class="trait-list" id="traits-list"></ul>
  </div>

  <div class="result-footer">
    <button class="btn-back" onclick="restart()">↺ 重新測驗</button>
    <button class="btn-back accent" onclick="window.location.href='index.html'">← 回工具箱</button>
  </div>
</div>
<div class="footer">河馬的小工具箱 © 2026 · 本工具僅供自我探索，不構成職涯建議</div>
</div>

<script>
// ── DATA ──
const T = {
  R:{
    name:'實用型',en:'Realistic',color:'#E8521A',
    desc:'偏好具體、動手的工作，擅長操作工具、機械或從事戶外活動，注重實際成果，不喜歡抽象理論或過多社交。',
    traits:['動手能力強，喜愛實際操作','踏實務實，追求具體成果','偏好戶外或機械環境','獨立自主，不需要太多指引','直接坦率，不喜歡繁複的社交場合'],
    careers:['工程師','建築師','機械師','廚師','消防員','農業技術員','飛行員','外科醫師','木工師傅','測量師']
  },
  I:{
    name:'研究型',en:'Investigative',color:'#2563EB',
    desc:'好奇心旺盛，喜歡觀察、分析與解決複雜問題，擅長邏輯推理，傾向獨立思考，享受知識探索的過程。',
    traits:['分析思維強，邏輯清晰','對知識有強烈的求知慾','偏好獨立研究，不喜歡被指揮','精確嚴謹，注重細節','享受解決複雜問題的成就感'],
    careers:['科學家','數據分析師','醫師','藥劑師','資訊工程師','研究員','數學家','生物學家','心理師','經濟學家']
  },
  A:{
    name:'藝術型',en:'Artistic',color:'#9333EA',
    desc:'富有創意與想像力，喜歡透過藝術、音樂、文字等方式表達自我，偏好自由彈性的工作環境，討厭過於規律的流程。',
    traits:['創造力豐富，想像力無限','情感細膩，善於表達','對美感有高度敏銳','獨立特行，不喜歡墨守成規','偏好自由開放的工作方式'],
    careers:['設計師','音樂家','作家','演員','攝影師','插畫師','廣告創意','動畫師','室內設計師','時裝設計師']
  },
  S:{
    name:'社會型',en:'Social',color:'#16A34A',
    desc:'熱衷與人互動、助人為樂，善於溝通、傾聽與教導，在教育、輔導與服務領域能充分發揮，具有強烈同理心。',
    traits:['善於溝通與傾聽','富有同理心，關心他人','喜歡團隊合作','擅長教導、輔導與說服','熱心助人，具有社會責任感'],
    careers:['教師','社工師','心理諮商師','護理師','人力資源','公關專員','職能治療師','兒童照護師','牧師','志工協調員']
  },
  E:{
    name:'企業型',en:'Enterprising',color:'#CA8A04',
    desc:'充滿自信與領導魅力，喜歡說服他人、達成目標，適合業務、管理與創業，對權力與影響力有強烈的追求。',
    traits:['自信積極，勇於冒險','領導力強，善於說服','目標導向，追求成就','喜歡競爭與挑戰','口才流利，具有感染力'],
    careers:['企業主管','銷售業務','律師','政治人物','創業家','房仲顧問','行銷經理','投資顧問','媒體主持人','公司負責人']
  },
  C:{
    name:'事務型',en:'Conventional',color:'#0891B2',
    desc:'做事有條理、講求精確，喜歡在有明確規則的環境工作，擅長處理數字、資料與行政事務，是可靠穩定的成員。',
    traits:['有條不紊，注重細節','可靠穩定，遵守規則','擅長資料整理與數字處理','謹慎保守，不喜歡模糊地帶','效率高，執行力強'],
    careers:['會計師','行政專員','秘書','稽核師','銀行員','統計師','圖書館員','法規人員','資料管理師','財務分析師']
  }
};

const ORDER = ['R','I','A','S','E','C'];

const QUESTIONS = [
  // R
  {t:'R', q:'我喜歡動手修理或組裝東西（電器、傢具、機械等）'},
  {t:'R', q:'我享受從事需要體力或戶外性質的工作'},
  {t:'R', q:'我喜歡操作工具、機器或精密設備'},
  {t:'R', q:'比起讀書研究，我更喜歡實際動手做'},
  {t:'R', q:'我對農業、園藝或與大自然相關的活動感興趣'},
  {t:'R', q:'我擅長用雙手解決實際問題'},
  // I
  {t:'I', q:'我喜歡研究事物背後的原理與規律'},
  {t:'I', q:'我對科學、數學或哲學方面的問題很感興趣'},
  {t:'I', q:'我傾向獨立思考，不喜歡完全依賴別人的意見'},
  {t:'I', q:'我會主動查閱資料、文獻來滿足好奇心'},
  {t:'I', q:'我擅長分析複雜情況，找出邏輯上的解答'},
  {t:'I', q:'我享受閱讀學術書籍或深度研究的過程'},
  // A
  {t:'A', q:'我喜歡創作，例如寫作、繪畫、音樂或設計'},
  {t:'A', q:'我對美學與藝術表現有強烈的感受與看法'},
  {t:'A', q:'我喜歡在工作中融入自己的創意與個性'},
  {t:'A', q:'我討厭太過規律、一成不變的工作流程'},
  {t:'A', q:'我經常用獨特的角度看待事物，不愛走尋常路'},
  {t:'A', q:'對我來說，自由表達比嚴格遵守規則更重要'},
  // S
  {t:'S', q:'我喜歡幫助他人解決問題或學習新事物'},
  {t:'S', q:'我擅長傾聽，能感受並理解他人的情緒與需求'},
  {t:'S', q:'我在與人互動、合作的環境中感到充實'},
  {t:'S', q:'我在教導、輔導或照顧他人時覺得很有意義'},
  {t:'S', q:'我重視人與人之間的情感連結'},
  {t:'S', q:'我希望我的工作能直接幫助或改善他人的生活'},
  // E
  {t:'E', q:'我喜歡帶領團隊，推動計畫朝目標前進'},
  {t:'E', q:'我擅長說服他人，讓對方接受我的想法'},
  {t:'E', q:'我對商業機會、競爭與挑戰感到興奮'},
  {t:'E', q:'我喜歡承擔責任，做出重要決策'},
  {t:'E', q:'我有強烈的成就動機，希望在事業上出人頭地'},
  {t:'E', q:'我喜歡公開演說或在眾人面前展現自己'},
  // C
  {t:'C', q:'我喜歡有條理地整理資料、檔案或報表'},
  {t:'C', q:'在有明確規則與程序的環境中，我工作得最好'},
  {t:'C', q:'我非常注重精確性，不容許自己犯粗心的錯誤'},
  {t:'C', q:'我擅長處理數字、表格或行政類事務'},
  {t:'C', q:'我覺得維持秩序與一致性非常重要'},
  {t:'C', q:'我喜歡照著計畫確實執行，不喜歡臨時變動'},
];

// Group by type (6 groups × 6 Qs)
const GROUPS = ORDER.map(type => QUESTIONS.filter(q=>q.t===type));

let curGroup = 0;
const answers = new Array(36).fill(0); // 0=未答, 1-5=分數

// ── BUILD UI ──
(function build(){
  const wrap = document.getElementById('groups-wrap');
  GROUPS.forEach((group, gi)=>{
    const type = ORDER[gi];
    const div = document.createElement('div');
    div.className = 'q-group';
    div.id = `g${gi}`;

    let cards = '';
    group.forEach((q, qi)=>{
      const idx = gi*6+qi;
      let btns = '';
      for(let v=1;v<=5;v++){
        btns += `<button class="scale-btn" id="sb-${idx}-${v}"
          style="--accent:${T[type].color}"
          onclick="pick(${idx},${v})">
          <div class="scale-circle"></div>
          <span class="scale-num">${v}</span>
        </button>`;
      }
      cards += `<div class="q-card">
        <div class="q-text">${qi+1}. ${q.q}</div>
        <div class="scale-row">${btns}</div>
        <div class="scale-labels">
          <span>完全不像我</span><span>非常像我</span>
        </div>
      </div>`;
    });

    div.innerHTML = `
      <div class="group-header">
        <div class="group-pip" style="background:${T[type].color}"></div>
        <span class="group-title">${T[type].name}（${type}）${T[type].en}</span>
      </div>
      ${cards}`;
    wrap.appendChild(div);
  });
  showGroup(0);
})();

function pick(idx, val){
  answers[idx] = val;
  const gi = Math.floor(idx/6);
  const type = ORDER[gi];
  for(let v=1;v<=5;v++){
    const btn = document.getElementById(`sb-${idx}-${v}`);
    if(btn) btn.classList.toggle('selected', v===val);
  }
}

function showGroup(i){
  document.querySelectorAll('.q-group').forEach(g=>g.classList.remove('active'));
  document.getElementById(`g${i}`).classList.add('active');
  curGroup = i;
  const pct = ((i+1)/GROUPS.length)*100;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `第 ${i+1} 組 / 共 ${GROUPS.length} 組`;
  document.getElementById('page-info').textContent = `${i+1} / ${GROUPS.length}`;
  document.getElementById('btn-prev').disabled = i===0;
  const isLast = i===GROUPS.length-1;
  document.getElementById('btn-next').textContent = isLast ? '查看結果 ✓' : '下一組 →';
}

function prevG(){ if(curGroup>0) showGroup(curGroup-1); }
function nextG(){
  if(curGroup < GROUPS.length-1){ showGroup(curGroup+1); }
  else { showResult(); }
}

// ── SCORES ──
function computeScores(){
  const s = {R:0,I:0,A:0,S:0,E:0,C:0};
  QUESTIONS.forEach((q,i)=>{ s[q.t] += answers[i]||3; }); // default 3 if unanswered
  return s;
}

// ── RESULT ──
function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='block';
  window.scrollTo(0,0);

  const scores = computeScores();
  const sorted = ORDER.slice().sort((a,b)=>scores[b]-scores[a]);
  const top3 = sorted.slice(0,3);
  const code = top3.join('');

  // Hero
  const heroGlow = {
    R:'#7c2d12',I:'#1e3a5f',A:'#3b1d5e',
    S:'#14532d',E:'#713f12',C:'#164e63'
  };
  const hero = document.getElementById('result-hero');
  hero.style.setProperty('--hero-glow', heroGlow[top3[0]]);
  document.getElementById('res-code').textContent = code;
  document.getElementById('res-code').style.color = T[top3[0]].color;
  document.getElementById('res-names').textContent =
    top3.map(t=>`${T[t].name}（${t}）`).join(' × ');
  document.getElementById('res-desc').textContent =
    `你同時具備 ${top3.map(t=>T[t].name).join('、')} 的傾向。Holland 理論中，三碼的組合代表你的複合型人格特質，每一型都是你真實的一部分。`;

  // Hex radar
  drawHex(scores, T[top3[0]].color);

  // Bars
  const maxScore = 30;
  let bars = '';
  ORDER.forEach(t=>{
    const pct = Math.round(scores[t]/maxScore*100);
    const rank = sorted.indexOf(t)+1;
    bars += `<div class="score-row">
      <div class="score-type-label" style="color:${T[t].color}">${t} ${T[t].name}</div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" style="width:${pct}%;background:${T[t].color}"></div>
      </div>
      <div class="score-val">${scores[t]} <span style="font-size:11px;color:#bbb">/ 30</span></div>
    </div>`;
  });
  document.getElementById('scores-bars').innerHTML = bars;

  // Three type cards
  let cards = '';
  top3.forEach((t,i)=>{
    const rank = i===0?'主型':i===1?'副型':'輔型';
    cards += `<div class="type-card">
      <div class="type-card-header">
        <div class="type-badge" style="background:${T[t].color}">${t}</div>
        <div>
          <div class="type-card-name">${T[t].name} <span style="font-size:12px;color:#aaa;font-weight:normal;">${rank}</span></div>
          <div class="type-card-sub">${T[t].en}</div>
        </div>
      </div>
      <p>${T[t].desc}</p>
      <div class="career-chips">
        ${T[t].careers.slice(0,6).map(c=>`<span class="career-chip">${c}</span>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('three-grid').innerHTML = cards;

  // Traits (top type)
  document.getElementById('traits-list').style.setProperty('--top-color', T[top3[0]].color);
  document.getElementById('traits-list').innerHTML =
    T[top3[0]].traits.map(tr=>`<li>${tr}</li>`).join('');

  // Animate bars
  setTimeout(()=>{
    document.querySelectorAll('.score-bar-fill').forEach(el=>{
      el.style.width = el.style.width; // trigger
    });
  }, 80);
}

function drawHex(scores, topColor){
  const svg = document.getElementById('hex-svg');
  const cx=150, cy=140, r=105;
  const angles = ORDER.map((_,i)=>(i*60-90)*Math.PI/180);
  const maxScore = 30;
  function pt(a,rad){ return [cx+rad*Math.cos(a), cy+rad*Math.sin(a)]; }

  let html='';
  // Grid rings
  [0.25,0.5,0.75,1].forEach(f=>{
    const pts=angles.map(a=>pt(a,r*f)).map(p=>p.join(',')).join(' ');
    html+=`<polygon points="${pts}" fill="none" stroke="#ddd" stroke-width="1"/>`;
  });
  // Axes
  angles.forEach(a=>{
    const [x2,y2]=pt(a,r);
    html+=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#ddd" stroke-width="1"/>`;
  });
  // Data
  const dataPts = ORDER.map((t,i)=>{
    const frac=scores[t]/maxScore;
    return pt(angles[i], r*frac);
  });
  html+=`<polygon points="${dataPts.map(p=>p.join(',')).join(' ')}"
    fill="${topColor}" fill-opacity="0.18" stroke="${topColor}" stroke-width="2.5"/>`;
  dataPts.forEach(([x,y],i)=>{
    html+=`<circle cx="${x}" cy="${y}" r="5" fill="${T[ORDER[i]].color}"/>`;
  });
  // Labels
  ORDER.forEach((t,i)=>{
    const [lx,ly]=pt(angles[i],r+22);
    const anchor=lx<cx-5?'end':lx>cx+5?'start':'middle';
    html+=`<text x="${lx}" y="${ly+5}" text-anchor="${anchor}"
      font-family="'Microsoft JhengHei',sans-serif" font-size="13" font-weight="bold"
      fill="${T[t].color}">${t}</text>`;
  });
  svg.innerHTML=html;
}

function restart(){
  answers.fill(0);
  document.querySelectorAll('.scale-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='block';
  showGroup(0);
  window.scrollTo(0,0);
}
</script>
